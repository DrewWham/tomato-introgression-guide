name: Render and publish Quarto site

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Quarto
        uses: quarto-dev/quarto-actions/setup@v2
        with:
          tinytex: true

      - name: Render HTML site
        run: quarto render index.qmd --to html

      - name: Render PDF
        run: quarto render index.qmd --to pdf

      - name: Copy PDF into site output
        run: |
          echo "Looking for rendered PDFs..."
          find . -maxdepth 3 -type f -name "*.pdf" -print

          if [ -f "_site/index.pdf" ]; then
            cp _site/index.pdf _site/tomato-introgression-guide.pdf
          elif [ -f "index.pdf" ]; then
            cp index.pdf _site/tomato-introgression-guide.pdf
          else
            echo "No rendered PDF found."
            exit 1
          fi

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4